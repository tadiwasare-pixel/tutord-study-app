<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b2b4a" />
  <title>TutorD 2026 · Study Hub</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <div class="brand-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24"><path d="M4 5.5A2.5 2.5 0 0 1 6.5 3H20v15.5A2.5 2.5 0 0 0 17.5 16H4z"></path><path d="M4 6v12.5A2.5 2.5 0 0 0 6.5 21H20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path><path d="M8 7.5h7M8 11h8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path></svg>
      </div>
      <div>
        <div class="brand-title">TutorD</div>
        <div class="brand-subtitle">2026 · Offline Ready</div>
      </div>
    </div>
    <div class="header-actions">
      <span id="syncBadge" class="pill">Synced</span>
      <span id="xpBadge" class="pill accent">0 XP</span>
      <button class="icon-btn" id="searchBtn" title="Search">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="6" fill="none" stroke="currentColor" stroke-width="2"></circle><path d="M20 20l-4.35-4.35" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path></svg>
      </button>
    </div>
  </header>

  <section class="top-strips">
    <div class="level-strip" id="levelStrip"></div>
    <div class="subject-strip" id="subjectStrip"></div>
  </section>

  <main class="main-content">
    <section class="tab-pane active" id="learnTab"></section>
    <section class="tab-pane" id="papersTab"></section>
    <section class="tab-pane" id="updatesTab"></section>
    <section class="tab-pane" id="communityTab"></section>
    <section class="tab-pane" id="profileTab"></section>
  </main>

  <nav class="bottom-nav">
    <button class="nav-item active" data-tab="learnTab">
      <svg viewBox="0 0 24 24"><path d="M3 11.5 12 4l9 7.5"></path><path d="M5 10.5V20h14v-9.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
      <span>Learn</span>
    </button>
    <button class="nav-item" data-tab="papersTab">
      <svg viewBox="0 0 24 24"><path d="M7 3h7l5 5v13H7z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"></path><path d="M14 3v5h5M10 12h6M10 16h6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path></svg>
      <span>Papers</span>
    </button>
    <button class="nav-item" data-tab="updatesTab">
      <svg viewBox="0 0 24 24"><path d="M12 3v18M3 12h18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path></svg>
      <span>Updates</span>
    </button>
    <button class="nav-item" data-tab="communityTab">
      <svg viewBox="0 0 24 24"><path d="M5 17.5V6a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H9l-4 3.5z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"></path></svg>
      <span>Community</span>
    </button>
    <button class="nav-item" data-tab="profileTab">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4" fill="none" stroke="currentColor" stroke-width="2"></circle><path d="M4 20a8 8 0 0 1 16 0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path></svg>
      <span>Profile</span>
    </button>
  </nav>

  

  <div id="toastHost" class="toast-host"></div>
  <script src="app.js"></script>
</body>
</html>
