<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin — Tutord Study App (Supabase)</title>
  <style>body{font-family:system-ui,Segoe UI,Roboto,Arial;margin:20px}label{display:block;margin:6px 0}input,textarea,select{font:inherit}nav{margin-bottom:12px}</style>
</head>
<body>
  <nav>
    <a href="/">Home</a> | <a href="/donate.html">Donate</a>
  </nav>

  <h1>Admin Panel (Supabase)</h1>

  <div>
    <h2>Login</h2>
    <label>Email: <input id="email" type="email" placeholder="admin email" /></label>
    <label>Password: <input id="password" type="password" placeholder="password" /></label>
    <button id="loginBtn">Login</button>
    <div id="loginMsg" aria-live="polite" style="color:red;margin-top:8px"></div>
  </div>

  <div id="panel" style="display:none;margin-top:12px">
    <h2>Create a post</h2>
    <label>Type:
      <select id="postType">
        <option value="update">Update</option>
        <option value="notes">Notes</option>
        <option value="past_paper">Past Paper</option>
      </select>
    </label>

    <label>Subject Number (optional): <input id="subjectNumber" type="number" min="1" max="40" /></label>
    <label>Title: <input id="title" type="text" /></label>
    <label>Content:<br /><textarea id="content" rows="6" cols="60"></textarea></label>

    <button id="postBtn">Post</button>
    <button id="logoutBtn">Logout</button>
    <div id="postMsg" aria-live="polite" style="color:green;margin-top:8px"></div>
  </div>

  <h2>All posts (preview)</h2>
  <div id="postsContainer"></div>

  <p style="margin-top:20px;font-size:0.9em;color:#555">Security: this page uses Supabase Auth. Be sure you set SUPABASE_URL and SUPABASE_ANON_KEY in the config below.</p>

  <!-- Supabase CDN (UMD) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/umd/supabase.min.js"></script>

  <!-- Replace the placeholders below with your actual SUPABASE_URL and ANON KEY or set them via a secure mechanism before deploying -->
  <script>
    // IMPORTANT: Replace these with your project's values (or set them dynamically).
    window.SUPABASE_URL = window.SUPABASE_URL || 'https://your-project-ref.supabase.co';
    window.SUPABASE_ANON_KEY = window.SUPABASE_ANON_KEY || 'eyJ...your_anon_key_here';
  </script>

  <script src="admin_supabase.js"></script>
  <script src="public-posts-supabase.js"></script>
</body>
</html>
